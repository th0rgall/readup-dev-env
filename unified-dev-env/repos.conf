# Readup repository configuration for bootstrap-repos.sh
#
# Format (whitespace-separated):
#   <local-path>   <git-url>   [branch]
#
# local-path  — directory under ~/readup/ where the repo will be cloned
# branch      — optional; omit to check out the remote's default branch
#
# To override this file, volume-map your own config:
#   -v /path/to/my-repos.conf:/home/dev/repos.conf:ro
# Or pass it directly to the script:
#   ~/bootstrap-repos.sh /path/to/my-repos.conf
#
# Default config:
#
# api     https://github.com/reallyreadit/api
# web     https://github.com/reallyreadit/web
# db      https://github.com/reallyreadit/db
# static  https://github.com/reallyreadit/static
# dev-env https://github.com/reallyreadit/dev-env

api https://github.com/th0rgall/api refactor/dotnet10
web https://github.com/th0rgall/readup-web
db https://github.com/th0rgall/readup-db fix/time-zone-data
static https://github.com/th0rgall/readup-static
dev-env https://github.com/th0rgall/readup-dev-env