# nginx config for the Readup unified dev environment container.
# All services run on localhost inside the same container, so upstream
# addresses use 127.0.0.1 instead of Docker service hostnames.

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Shared SSL config — included by each server block below.
    # Certs are copied from dev-env/ssl/ during Docker build.
    ssl_certificate     /etc/ssl/dev.readup.org.cer;
    ssl_certificate_key /etc/ssl/dev.readup.org.key;

    server {
        listen 443 ssl;
        server_name api.dev.readup.org;
        location / {
            proxy_pass http://127.0.0.1:5000;
        }
    }

    server {
        listen 443 ssl;
        server_name dev.readup.org;
        location / {
            proxy_pass http://127.0.0.1:5001;
        }
    }

    server {
        listen 443 ssl;
        server_name static.dev.readup.org;

        # Static asset files from the static repo
        location / {
            root /home/dev/readup/static/content;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "max-age=0";
        }
        # Compiled web bundles (app client)
        location /app/bundles {
            alias /home/dev/readup/web/bin/dev/app/client;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "max-age=0";
        }
        location /common/auth-service-popup-handler/v1/index.html {
            alias /home/dev/readup/web/src/common/auth-service-popup-handler/index.html;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "max-age=0";
        }
        # Compiled embed bundles
        location /embed {
            alias /home/dev/readup/web/bin/dev/embed;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "max-age=0";
        }
    }

    server {
        listen 443 ssl;
        server_name blog.dev.readup.org;
        location / {
            root /home/dev/readup/blog/_site;
            add_header Cache-Control "max-age=0";
        }
    }

    server {
        listen 443 ssl;
        server_name article-test.dev.readup.org;
        location / {
            proxy_pass http://127.0.0.1:5002;
        }
    }

    server {
        listen 443 ssl;
        server_name twitter-test.dev.readup.org;
        location / {
            proxy_pass http://127.0.0.1:5003;
        }
    }

    # CORS-avoiding reverse proxy to the PRODUCTION API (https://api.readup.org).
    # api.readup.org only allows browser requests from https://readup.org, so when
    # the web app is pointed here (see ~/readup/swap-api-target.sh) this vhost
    # forwards everything to prod but strips the upstream CORS headers and emits
    # its own, allowing the local web origin https://dev.readup.org.
    server {
        listen 443 ssl;
        server_name prodproxy.dev.readup.org;

        location / {
            # Answer CORS preflight here (don't forward it upstream).
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      "https://dev.readup.org" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "$http_access_control_request_headers" always;
                add_header Access-Control-Max-Age           "600" always;
                add_header Content-Length                   "0";
                add_header Content-Type                     "text/plain";
                return 204;
            }

            # Take over CORS: drop whatever api.readup.org sent, emit our own.
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header Access-Control-Allow-Origin      "https://dev.readup.org" always;
            add_header Access-Control-Allow-Credentials "true" always;

            proxy_pass https://api.readup.org;
            proxy_ssl_server_name on;                 # send SNI = api.readup.org
            proxy_set_header Host api.readup.org;
            proxy_set_header X-Forwarded-Proto https;

            # Re-scope prod session cookies to the dev domain so login sticks.
            proxy_cookie_domain .readup.org .dev.readup.org;
            proxy_cookie_domain readup.org  dev.readup.org;
        }
    }
}
