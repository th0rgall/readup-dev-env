# docker-compose.yml
services:
  readup:
    image: readup-dev
    build:
      # Build context = dev-env repo root, so the Dockerfile can COPY the SSL certs.
      context: ..
      dockerfile: unified-dev-env/Dockerfile
    container_name: ${CONTAINER_NAME:-readup-dev}
    ports:
      - 443:443
    volumes:
      # Database persistence
      - ./db:/var/lib/postgresql/14/main
      # Volume to cache readup repositories
      - ./src:/home/dev/readup
      # Anonymous volume caching the VS Code Server + extensions installed on
      # first attach, so they survive container recreation and only download once.
      - /home/dev/.vscode-server
      # Claude settings
      - "${CLAUDE_PATH}:/home/dev/.claude"
      - "${CLAUDE_PATH}.json:/home/dev/.claude.json"
    restart: unless-stopped
    env_file: .env

volumes:
  readup-db-data:
